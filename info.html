<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期中作業</title>
    <link rel="stylesheet" href="style.css" media="all">
    <link href="https://fonts.googleapis.com/css?family=Limelight" rel="stylesheet">
</head>
<body>
    <header>
        <h1>車輛資料庫</h1>
        <ul class="navLinks">
            <li><a href="index.html">首頁</a></li>
            <li><a href="info.html">車輛資料庫</a></li>
            <li><a href="schedule.html">課表</a></li>
            <li><a href="search.html">Google搜尋</a></li>
            <li><a href="self.html">自我介紹</a></li>
        </ul>
        <p>輸入你的愛車資料吧</p>
    </header>
    <main id="contents">
        <form id="entryForm" action="#" method="post">
            <fieldset class="vehicleInfo">
                <legend>車輛資料</legend>
                <table class="entryTable" border="1">
                    <tr><th>種類</th>
                        <td><input type="radio" name="type" id="vehicle_car" value="car">
                            <label for="vehicle_car">汽車</label>
                            <input type="radio" name="type" id="vehicle_scooter" value="scooter">
                            <label for="vehicle_scooter">速可達</label>
                            <input type="radio" name="type" id="vehicle_motorcycle" value="motorcycle">
                            <label for="vehicle_motorcycle">檔車</label>
                        </td>
                    </tr>
                    <tr><th>品牌</th><td><input type="text" name="brand" placeholder="請輸入品牌" required></td></tr>
                    <tr><th>型號</th><td><input type="text" name="model" placeholder="請輸入型號" required></td></tr>
                    <tr><th>里程</th><td><select name="mileage" id="mileage" required>
                        <option value="" selected >請選擇里程</option>
                        <option value="0-10000">0-10,000公里</option>
                        <option value="10000-20000">10,000-20,000公里</option>
                            <option value="20000-30000">20,000-30,000公里</option>
                            <option value="30000~">30,000公里以上</option>
                    </select></td></tr>
                    <tr><th>駕駛習慣</th>
                        <td>
                            <input type="checkbox" name="style" id="style1" value="city"><label for="style1">市區</label>
                            <input type="checkbox" name="style" id="style2" value="highway"><label for="style2">高速</label>
                            <input type="checkbox" name="style" id="style3" value="offroad"><label for="style3">越野</label>
                            <input type="checkbox" name="style" id="style4" value="track"><label for="style4">賽道</label>
                            <input type="checkbox" name="style" id="style5" value="mountain"><label for="style5">山路</label>
                            <input type="checkbox" name="style" id="style6" value="other"><label for="style6">其他</label>
                        </td></tr>
                    <tr><th>車輛照片</th><td><input type="file" name="vehiclePhoto" accept="image/*"></td></tr>
                </table>
            </fieldset>
            <fieldset class="ownerInfo">
                <legend>車主資料</legend>
                <table class="entryTable" border="1">
                    <tr><th>姓名</th><td><input type="text" name="ownerName" placeholder="王曉明" required><small>請輸入完整姓名</small></td></tr>
                    <tr><th>電話</th><td><input type="text" name="phone" placeholder="0912345678" required><small>請輸入正確電話號碼</small></td></tr>
                    <tr><th>信箱</th><td><input type="email" name="email" placeholder="abc@gmail.com" required><small>請輸入正確信箱</small></td></tr>
                </table>
            </fieldset>
            <div class="entryBtns">
                <input type="submit" value="送出">
                <input type="reset" value="清除">
            </div>
        </form>
    </main>
</body>
</html>
